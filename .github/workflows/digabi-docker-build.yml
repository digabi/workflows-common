name: "Docker Build&Push"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name of the Docker image"
        required: true
        type: string
      docker-target:
        description: "Target stage for the Docker build (e.g., production, staging) need "
        required: false
        type: string
      no-npm:
        description: "set to true to skip node setup if unecessary"
        required: false
        type: boolean
        default: false
      file:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: "Context for the Docker build"
        required: false
        type: string
        default: "."
      tag-latest:
        description: "Set to true to tag the image with latest"
        required: false
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        description: "NPM authentication token for private packages"
        required: true
      AWS_ACCOUNT_ID:
        description: "AWS Account ID for ECR access"
        required: true
    outputs:
      image_tag_latest:
        description: "Latest tag for the Docker image"
        value: ${{ jobs.docker-build.outputs.image_tag_latest }}
      image_tag:
        description: "Build tag for the Docker image"
        value: ${{ jobs.docker-build.outputs.image_tag }}

jobs:
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    outputs:
      image_tag_latest: ${{ steps.docker-tags.outputs.image_tag_latest }}
      image_tag: ${{ steps.docker-tags.outputs.image_tag }}
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Get latest commit SHA
        id: sha
        uses: digabi/workflows-common/actions/last-commit-sha@main

      - uses: actions/checkout@v7
        with:
          # If not set manually, pull request build will run on the merge commit and docker image will actually contain current master and changes.
          ref: ${{ steps.sha.outputs.last_commit_sha }}

      - uses: actions/setup-node@v6
        if: ${{ !inputs.no-npm }}
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - id: docker-tags
        uses: digabi/workflows-common/actions/get-image-tags@main
      - name: Resolve build policy
        id: build-policy
        run: echo "skip_aws_push=${{ startsWith(steps.docker-tags.outputs.image_tag, 'dependabot') }}" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Dry run Docker build
        if: ${{ steps.build-policy.outputs.skip_aws_push == 'true' && !inputs.tag-latest }}
        uses: docker/build-push-action@v7
        with:
          push: false
          file: ${{ inputs.file }}
          context: ${{ inputs.context }}
          tags: ${{ inputs.image-name }}:${{ steps.docker-tags.outputs.image_tag }}
          provenance: false
          target: ${{ inputs.docker-target }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            npmrc=//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
      - name: Assume AWS role
        uses: digabi/workflows-common/actions/assume-digabi-aws-role@main
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push to Amazon ECR
        if: ${{ steps.build-policy.outputs.skip_aws_push != 'true' }}
        uses: docker/build-push-action@v7
        with:
          push: true
          file: ${{ inputs.file }}
          context: ${{ inputs.context }}
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.image-name }}:${{ steps.docker-tags.outputs.image_tag }}
          provenance: false
          target: ${{ inputs.docker-target }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            npmrc=//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
      - name: Log in to the GitHub Container registry
        if: ${{ inputs.tag-latest }}
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push latest tag to GitHub Container Registry
        if: ${{ inputs.tag-latest }}
        uses: docker/build-push-action@v7
        with:
          push: true
          file: ${{ inputs.file }}
          context: ${{ inputs.context }}
          tags: ghcr.io/digabi/${{ inputs.image-name }}:${{ steps.docker-tags.outputs.image_tag_latest }}
          provenance: false
          target: ${{ inputs.docker-target }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            npmrc=//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
      - name: Delete orphaned images from Github Container Registry
        if: ${{ inputs.tag-latest }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ inputs.image-name }}
          package-type: "container"
          min-versions-to-keep: 0
          delete-only-untagged-versions: "true"
